services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      OWARE_CLIENT_SALT: ${OWARE_CLIENT_SALT:-dev-salt-not-for-prod}
      OWARE_ALLOWED_ORIGINS: ${OWARE_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      OWARE_COOKIE_SAMESITE: ${OWARE_COOKIE_SAMESITE:-lax}
      OWARE_COOKIE_SECURE: ${OWARE_COOKIE_SECURE:-0}
    volumes:
      - oware-data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  oware-data:
